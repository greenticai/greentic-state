name: CI
on:
  workflow_call:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main
    with:
      # Semver advisory moved off PR onto a nightly schedule — see
      # nightly-semver.yml. The old `run-semver-checks: false` flag and the
      # `semver-checks-package` filter now live on the nightly caller.
      clippy-args: "-p greentic-state -p provider-common --all-targets --all-features -- -D warnings"
      test-args: "-p greentic-state -p provider-common --all-features"

  state-packs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@main

      - name: Install greentic-pack
        run: cargo binstall greentic-pack --no-confirm

      - name: Build state gtpacks
        run: bash ./tools/build_state_packs.sh
