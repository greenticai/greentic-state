name: CI
on:
  workflow_call:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main
    with:
      run-semver-checks: false  # TODO: re-enable once semver baselines are stable
      semver-checks-package: "greentic-state,provider-common"
      clippy-args: "-p greentic-state -p provider-common --all-targets --all-features -- -D warnings"
      test-args: "-p greentic-state -p provider-common --all-features"

  state-packs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.94.0
          components: clippy, rustfmt
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@main

      - name: Install greentic-pack
        run: cargo binstall greentic-pack --no-confirm

      - name: Build state gtpacks
        run: bash ./tools/build_state_packs.sh
