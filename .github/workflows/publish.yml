name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Start Redis
        run: |
          docker run -d --rm --name redis-ci -p 6379:6379 redis:7
          timeout 30s bash -c 'until docker exec redis-ci redis-cli ping >/dev/null 2>&1; do sleep 1; done'

      - name: Tests
        env:
          REDIS_URL: redis://127.0.0.1:6379/
        run: cargo test --workspace --all-features

      - name: Stop Redis
        if: always()
        run: docker stop redis-ci

  publish:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0

      - uses: Swatinem/rust-cache@v2

      - name: Fail if path or git dependencies exist
        run: |
          cargo metadata --format-version 1 \
          | jq -r '.packages[] | select(.name=="greentic-state") | .dependencies[] | select(.source==null or (.source|startswith("git+"))) | .name' \
          | tee /dev/stderr \
          | (! grep .)

      - name: Cargo publish dry-run (sanity)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run

      - name: Publish crate
        uses: katyo/publish-crates@v2
        with:
          path: .
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ignore-unpublished-changes: true
          check-repo: true
          dry-run: false

  publish-ghcr:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    env:
      OCI_REGISTRY: ghcr.io
      OCI_REPO_PREFIX: packs/state
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0

      - uses: Swatinem/rust-cache@v2

      - uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0

      - name: Package crate
        run: cargo package --allow-dirty

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish backend OCI artifacts
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          crate_version="$(
            cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name=="greentic-state") | .version'
          )"
          crate_file="target/package/greentic-state-${crate_version}.crate"

          if [ ! -f "${crate_file}" ]; then
            echo "expected packaged crate at ${crate_file}" >&2
            exit 1
          fi

          publish_backend() {
            local backend_name="$1"
            local feature_json="$2"
            local ref_base="${OCI_REGISTRY}/${GITHUB_OWNER}/${OCI_REPO_PREFIX}/${backend_name}"
            local metadata_file="/tmp/${backend_name}.json"

            cat > "${metadata_file}" <<EOF
          {
            "crate": "greentic-state",
            "version": "${crate_version}",
            "backend": "${backend_name}",
            "features": ${feature_json},
            "source": "https://github.com/${GITHUB_REPOSITORY}",
            "revision": "${GIT_SHA}"
          }
          EOF

            oras push "${ref_base}:${crate_version}" \
              --artifact-type application/vnd.greentic.state.crate.v1 \
              --annotation "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
              --annotation "org.opencontainers.image.revision=${GIT_SHA}" \
              --annotation "org.opencontainers.image.version=${crate_version}" \
              --annotation "org.opencontainers.image.title=${backend_name}" \
              "${crate_file}:application/vnd.rust.crate" \
              "${metadata_file}:application/json"

            oras push "${ref_base}:latest" \
              --artifact-type application/vnd.greentic.state.crate.v1 \
              --annotation "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
              --annotation "org.opencontainers.image.revision=${GIT_SHA}" \
              --annotation "org.opencontainers.image.version=${crate_version}" \
              --annotation "org.opencontainers.image.title=${backend_name}" \
              "${crate_file}:application/vnd.rust.crate" \
              "${metadata_file}:application/json"
          }

          publish_backend "state-memory" '[]'
          publish_backend "state-redis" '["redis"]'
